services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - gradle-cache:/root/.gradle

  frontend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: frontend-dev
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - node_modules:/app/frontend/node_modules
    command: sh -c "bun install && bun run ng serve --host 0.0.0.0 --proxy-config proxy.conf.docker.json"
    depends_on:
      - backend

  backend-prod:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    ports:
      - "8080:8080"
    profiles:
      - prod

volumes:
  gradle-cache:
  node_modules: