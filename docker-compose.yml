services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - gradle-cache:/root/.gradle

  backend-prod:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    ports:
      - "8080:8080"
    profiles:
      - prod

volumes:
  gradle-cache: