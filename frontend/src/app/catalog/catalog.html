<h2 class="catalog-title">Products</h2>

@if (products.isLoading()) {
  <p class="catalog-status">Loading products&hellip</p>
} @else if (products.error()) {
  <div class="catalog-error-container">
    <p class="catalog-status catalog-error">Failed to load products.</p>
    <button class="retry-btn" (click)="products.reload()">Try again</button>
  </div>
} @else {
  <div class="product-grid">
    @for (product of products.value(); track product.sku) {
      <app-product-tile [product]="product" />
    } @empty {
      <p class="catalog-status">No products available.</p>
    }
  </div>
}
